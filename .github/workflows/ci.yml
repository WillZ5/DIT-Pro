name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust Backend Tests ────────────────────────────────────────────
  rust-tests:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ matrix.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check
        working-directory: src-tauri

      - name: Clippy lints
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Run unit tests
        run: cargo test --lib --verbose
        working-directory: src-tauri

      - name: Run integration tests
        run: cargo test --tests --verbose
        working-directory: src-tauri

      - name: Run doc tests
        run: cargo test --doc --verbose
        working-directory: src-tauri

  # ─── Release Build Benchmark ───────────────────────────────────────
  benchmark:
    name: Hash Throughput Benchmark
    runs-on: macos-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmark (release mode)
        run: cargo test --release --test hash_benchmark -- --nocapture
        working-directory: src-tauri

  # ─── Frontend Type Check ───────────────────────────────────────────
  frontend:
    name: Frontend Type Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── Universal macOS DMG Build ─────────────────────────────────────
  build-universal:
    name: Build Universal DMG (Intel + Apple Silicon)
    runs-on: macos-latest
    needs: [rust-tests, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-universal-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-universal-

      - name: Build Universal macOS app
        run: cargo tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Verify Universal binary
        run: file target/universal-apple-darwin/release/dit-pro

      - name: Upload Universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: DIT-Pro-universal-dmg
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Universal App
        uses: actions/upload-artifact@v4
        with:
          name: DIT-Pro-universal-app
          path: target/universal-apple-darwin/release/bundle/macos/*.app

  # ─── Windows NSIS Installer Build ──────────────────────────────────
  build-windows:
    name: Build Windows NSIS Installer
    runs-on: windows-latest
    needs: [rust-tests, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-windows-

      - name: Build Windows app
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: DIT-Pro-windows-installer
          path: target/release/bundle/nsis/*.exe

  # ─── MHL Verify CLI ───────────────────────────────────────────────
  mhl-cli:
    name: MHL Verify CLI Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build mhl-verify-cli
        run: cargo build --release
        working-directory: mhl-verify-cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mhl-verify-cli-macos
          path: mhl-verify-cli/target/release/mhl-verify
          if-no-files-found: ignore
